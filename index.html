<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA Election 2026 — Live Results Map</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500;700&display=swap" rel="stylesheet" crossorigin>
<style>
  :root {
    /* M3 Dark Theme Tokens */
    --md-sys-color-surface: #1C1B1F;
    --md-sys-color-surface-container: #211F26;
    --md-sys-color-surface-container-high: #2B2930;
    --md-sys-color-surface-container-highest: #36343B;
    --md-sys-color-on-surface: #E6E1E5;
    --md-sys-color-on-surface-variant: #CAC4D0;
    --md-sys-color-outline: #938F99;
    --md-sys-color-outline-variant: #49454F;
    --md-sys-color-primary: #D0BCFF;
    --md-sys-color-on-primary: #381E72;
    --md-sys-color-primary-container: #4F378B;
    --md-sys-color-tertiary: #EFB8C8;
    --md-sys-color-error: #F2B8B5;
    --md-sys-color-inverse-surface: #E6E1E5;
    --md-sys-color-inverse-on-surface: #313033;
    /* M3 Elevation */
    --md-sys-elevation-1: 0px 1px 2px 0px rgba(0,0,0,0.3), 0px 1px 3px 1px rgba(0,0,0,0.15);
    --md-sys-elevation-2: 0px 1px 2px 0px rgba(0,0,0,0.3), 0px 2px 6px 2px rgba(0,0,0,0.15);
    --md-sys-elevation-3: 0px 1px 3px 0px rgba(0,0,0,0.3), 0px 4px 8px 3px rgba(0,0,0,0.15);
    /* M3 Shape */
    --md-sys-shape-corner-small: 8px;
    --md-sys-shape-corner-medium: 12px;
    --md-sys-shape-corner-large: 16px;
    --md-sys-shape-corner-extra-large: 28px;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    font-family: 'Google Sans Text', 'Google Sans', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--md-sys-color-surface);
  }
  #map { position: absolute; top: 0; bottom: 0; width: 100%; }

  /* Header — M3 Surface Container with elevation 2 */
  .header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 2;
    background: var(--md-sys-color-surface-container);
    color: var(--md-sys-color-on-surface);
    padding: 14px 24px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: var(--md-sys-elevation-2);
  }
  .header h1 {
    margin: 0; font-size: 22px; font-weight: 475;
    font-family: 'Google Sans', sans-serif;
    letter-spacing: 0; white-space: nowrap;
  }
  .header .counted {
    font-size: 12px; font-weight: 500;
    color: var(--md-sys-color-on-surface-variant);
    letter-spacing: 0.5px;
  }

  /* Totals — M3 Assist Chips / Tonal Buttons */
  .totals {
    display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; justify-content: flex-end;
  }
  .total-badge {
    display: flex; align-items: center; gap: 8px;
    background: var(--md-sys-color-surface-container-high);
    border: 1px solid var(--md-sys-color-outline-variant);
    border-radius: var(--md-sys-shape-corner-small);
    padding: 6px 12px; font-size: 12px; font-weight: 500;
    letter-spacing: 0.5px;
  }
  .total-badge .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .total-badge .num {
    font-size: 16px; font-weight: 700;
    font-family: 'Google Sans', sans-serif;
  }
  .majority-line {
    font-size: 11px; font-weight: 500;
    color: var(--md-sys-color-tertiary);
    margin-left: 4px; letter-spacing: 0.5px;
  }

  /* Legend — M3 Surface Container Highest, elevation 1 */
  .legend {
    position: absolute; bottom: 30px; left: 10px; z-index: 1;
    background: var(--md-sys-color-surface-container-highest);
    border-radius: var(--md-sys-shape-corner-medium);
    padding: 12px 16px;
    color: var(--md-sys-color-on-surface);
    font-size: 12px; font-weight: 500;
    box-shadow: var(--md-sys-elevation-1);
    backdrop-filter: blur(12px);
    border: 1px solid var(--md-sys-color-outline-variant);
  }
  .legend-item {
    display: flex; align-items: center; gap: 10px; margin: 5px 0;
    color: var(--md-sys-color-on-surface-variant);
    font-size: 12px; letter-spacing: 0.4px;
  }
  .legend-swatch {
    width: 16px; height: 16px;
    border-radius: 4px; flex-shrink: 0;
  }

  /* Mobile responsive */
  @media (max-width: 600px) {
    .header {
      flex-direction: column; align-items: flex-start; gap: 8px;
      padding: 12px 16px;
    }
    .header h1 { font-size: 18px; }
    .header .counted { font-size: 11px; }
    .totals { margin-left: 0; gap: 6px; }
    .total-badge { padding: 4px 8px; font-size: 11px; }
    .total-badge .num { font-size: 14px; }
    .majority-line { display: none; }
    .legend {
      bottom: 10px; left: 6px;
      padding: 8px 12px; font-size: 11px;
      max-width: 160px;
    }
    .legend-swatch { width: 12px; height: 12px; }
    .district-marker { padding: 2px 6px; }
    .district-marker .dm-name { font-size: 9px; }
    .district-marker .dm-swing { font-size: 10px; }
  }

  /* Map markers — M3 Surface with elevation 1 */
  .maplibregl-marker {
    will-change: transform;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .district-marker {
    background: var(--md-sys-color-inverse-surface);
    border-radius: var(--md-sys-shape-corner-small);
    padding: 4px 8px;
    text-align: center;
    pointer-events: none;
    box-shadow: var(--md-sys-elevation-1);
    line-height: 1.3;
    white-space: nowrap;
    transform-origin: center center;
    will-change: transform;
  }
  .district-marker.zoom-transitioning {
    transition: transform 0.15s ease;
  }
  .district-marker .dm-name {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--md-sys-color-inverse-on-surface);
  }
  .district-marker .dm-swing {
    font-size: 12px;
    font-weight: 500;
    margin-top: 1px;
  }
  /* Zoom-based marker scaling */
  .district-marker.zoom-far { transform: scale(0.45); }
  .district-marker.zoom-far .dm-swing { display: none; }
  .district-marker.zoom-mid { transform: scale(0.7); }
  .district-marker.zoom-mid .dm-swing { display: none; }
  .district-marker.zoom-close { transform: scale(0.85); }
  .district-marker.zoom-full { transform: scale(1); }
  .district-marker .dm-swing.positive { color: #2e7d32; }
  .district-marker .dm-swing.negative { color: #c62828; }
  .district-marker.no-votes {
    background: var(--md-sys-color-surface-container-highest);
    border: 1px solid var(--md-sys-color-outline-variant);
  }
  .district-marker.no-votes .dm-name { color: var(--md-sys-color-outline); }

  /* Popup — M3 Surface Container High */
  .popup-content {
    font-size: 14px; line-height: 1.6; min-width: 220px;
    font-family: 'Google Sans Text', sans-serif;
  }
  .popup-content .seat-name {
    font-size: 16px; font-weight: 500; margin-bottom: 6px;
    font-family: 'Google Sans', sans-serif;
  }
  .popup-content .party-tag {
    display: inline-block; padding: 3px 10px;
    border-radius: 100px;
    font-weight: 500; font-size: 11px; letter-spacing: 0.5px;
    color: white; margin-bottom: 4px;
  }
  .popup-content .status {
    font-size: 11px; color: #666;
    text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500;
  }
  .popup-content .swing-line { font-size: 13px; margin-top: 6px; }
  .popup-content .swing-arrow { font-weight: 500; }
  .popup-content .swing-to { color: #2e7d32; }
  .popup-content .swing-from { color: #c62828; }
  .popup-content .counted-pct { font-size: 12px; color: #888; font-weight: 400; }
  .popup-content .held-note {
    font-size: 11px; color: #e74c3c;
    font-weight: 500; margin-top: 2px; letter-spacing: 0.3px;
  }

  /* Hover tooltip — M3 Surface Container, elevation 3 */
  .hover-tooltip {
    position: absolute; top: 90px; left: 10px; z-index: 1;
    background: var(--md-sys-color-surface-container-highest);
    border-radius: var(--md-sys-shape-corner-medium);
    padding: 12px 20px;
    color: var(--md-sys-color-on-surface);
    font-size: 18px; font-weight: 475;
    font-family: 'Google Sans', sans-serif;
    display: none;
    box-shadow: var(--md-sys-elevation-3);
    backdrop-filter: blur(12px);
    pointer-events: none;
    border: 1px solid var(--md-sys-color-outline-variant);
  }
  .hover-tooltip .ht-party {
    display: inline-block; padding: 2px 10px;
    border-radius: 100px;
    font-size: 13px; font-weight: 500; letter-spacing: 0.5px;
    color: white; margin-left: 10px;
  }
  .hover-tooltip .ht-swing {
    font-size: 14px; font-weight: 400; margin-left: 10px;
    color: var(--md-sys-color-on-surface-variant);
  }

  /* M3 style MapLibre popup override */
  .maplibregl-popup-content {
    border-radius: var(--md-sys-shape-corner-medium) !important;
    box-shadow: var(--md-sys-elevation-3) !important;
    padding: 16px !important;
    font-family: 'Google Sans Text', sans-serif !important;
  }
  .maplibregl-popup-close-button {
    font-size: 18px; padding: 4px 8px;
    color: #666; border-radius: 50%;
  }
  .maplibregl-popup-close-button:hover {
    background: rgba(0,0,0,0.06);
  }
</style>
</head>

const partyColors = {
  ALP: '#E53935', LIB: '#1E88E5', GRN: '#43A047',
  ONP: '#FF8F00', IND: '#AB47BC', SAB: '#F4511E', '': '#444'
};
const partyNames = {
  ALP: 'Labor', LIB: 'Liberal', GRN: 'Greens', ONP: 'One Nation',
  IND: 'Independent', SAB: 'SA-Best', '': 'No votes'
};

function parseSwing(swingStr) {
  if (!swingStr || swingStr === 'No swing') return { pct: 0, direction: '', toParty: '' };
  const m = swingStr.match(/([\d.]+)%\s+swing\s+(to|from)\s+(\w+)/);
  if (!m) return { pct: 0, direction: '', toParty: '' };
  return { pct: parseFloat(m[1]), direction: m[2], toParty: m[3] };
}

// Merge election results into geojson
geojsonData.features.forEach(f => {
  const name = f.properties.name;
  const key = Object.keys(electionResults).find(k => k.toUpperCase() === name.toUpperCase()) || name;
  const result = electionResults[key] || {};
  f.properties.party = result.party || '';
  f.properties.status = result.status || 'no_votes';
  f.properties.held = result.held || '';
  f.properties.swing = result.swing || '';
  f.properties.counted = result.counted || '0.0%';
  f.properties.color = partyColors[result.party] || '#444';

  const sw = parseSwing(result.swing);
  f.properties.swingPct = sw.pct;
  f.properties.swingDir = sw.direction;
  f.properties.swingToParty = sw.toParty;

  if (sw.pct > 0) {
    const pLabel = partyNames[sw.toParty] || sw.toParty;
    if (sw.direction === 'to') {
      f.properties.swingLabel = '\u25B2 ' + sw.pct.toFixed(1) + '% to ' + pLabel;
      f.properties.swingPositive = 1;
    } else {
      f.properties.swingLabel = '\u25BC ' + sw.pct.toFixed(1) + '% from ' + pLabel;
      f.properties.swingPositive = 0;
    }
  } else {
    f.properties.swingLabel = '';
    f.properties.swingPositive = -1;
  }
});

    paint: {
      'fill-color': ['get', 'color'],
      'fill-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 0.7, 0.55]
    }
  });

  // Ahead seats: lighter fill
  map.addLayer({
    id: 'district-fills-ahead',
    type: 'fill',
    source: 'districts',
    filter: ['==', ['get', 'status'], 'ahead'],
    paint: {
      'fill-color': ['get', 'color'],
      'fill-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 0.55, 0.35]
    }
  });

  // No votes: grey fill
  map.addLayer({
    id: 'district-fills-none',
    type: 'fill',
    source: 'districts',
    filter: ['==', ['get', 'status'], 'no_votes'],
    paint: {
      'fill-color': '#444',
      'fill-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 0.4, 0.2]
    }
  });

  // Borders
  map.addLayer({
    id: 'district-borders',
    type: 'line',
    source: 'districts',
    paint: {
      'line-color': ['case', ['boolean', ['feature-state', 'hover'], false], '#fff', 'rgba(255,255,255,0.5)'],
      'line-width': ['case', ['boolean', ['feature-state', 'hover'], false], 2.5, 1]
    }
  });

  // Won/retain/gain seats thick colored border
  map.addLayer({
    id: 'district-borders-won',
    type: 'line',
    source: 'districts',
    filter: ['any', ['==', ['get', 'status'], 'won'], ['==', ['get', 'status'], 'retain'], ['==', ['get', 'status'], 'gain'], ['==', ['get', 'status'], 'win']],
    paint: { 'line-color': ['get', 'color'], 'line-width': 3 }
  });

  // HTML markers for district name + swing in one box
  function getCentroid(geometry) {
    let coords = [];
    function collect(c, type) {
      if (type === 'Polygon') {
        c[0].forEach(p => coords.push(p));
      } else if (type === 'MultiPolygon') {
        let maxLen = 0, maxRing = c[0][0];
        c.forEach(poly => { if (poly[0].length > maxLen) { maxLen = poly[0].length; maxRing = poly[0]; } });
        maxRing.forEach(p => coords.push(p));
      }
    }
    collect(geometry.coordinates, geometry.type);
    let sx = 0, sy = 0;
    coords.forEach(p => { sx += p[0]; sy += p[1]; });
    return [sx / coords.length, sy / coords.length];
  }

  geojsonData.features.forEach(f => {
    const props = f.properties;
    const center = getCentroid(f.geometry);
    const el = document.createElement('div');
    el.className = 'district-marker' + (props.status === 'no_votes' || props.status === '' ? ' no-votes' : '');

    let swingHtml = '';
    if (props.swingLabel) {
      const cls = props.swingPositive === 1 ? 'positive' : 'negative';
      swingHtml = '<div class="dm-swing ' + cls + '">' + props.swingLabel + '</div>';
    }

    el.innerHTML = '<div class="dm-name">' + props.name + '</div>' + swingHtml;

    new maplibregl.Marker({ element: el, anchor: 'center' })
      .setLngLat(center)
      .addTo(map);
  });

  // Zoom-based marker scaling
  let currentZoomClass = '';
  let zoomTransitionTimer = null;
  function updateMarkerZoom() {
    const zoom = map.getZoom();
    let cls;
    if (zoom < 8) cls = 'zoom-far';
    else if (zoom < 9.5) cls = 'zoom-mid';
    else if (zoom < 11) cls = 'zoom-close';
    else cls = 'zoom-full';
    if (cls === currentZoomClass) return;
    currentZoomClass = cls;
    const markers = document.querySelectorAll('.district-marker');
    markers.forEach(el => {
      el.classList.add('zoom-transitioning');
      el.classList.remove('zoom-far', 'zoom-mid', 'zoom-close', 'zoom-full');
      el.classList.add(cls);
    });
    clearTimeout(zoomTransitionTimer);
    zoomTransitionTimer = setTimeout(() => {
      markers.forEach(el => el.classList.remove('zoom-transitioning'));
    }, 200);
  }
  map.on('zoom', updateMarkerZoom);
  updateMarkerZoom();

  // Hover + click interactions
  let hoveredId = null;
  const tooltip = document.getElementById('hover-tooltip');
  const layers = ['district-fills-won', 'district-fills-ahead', 'district-fills-none'];

  layers.forEach(layer => {
    map.on('mousemove', layer, (e) => {
      if (e.features.length > 0) {
        if (hoveredId !== null) {
          map.setFeatureState({ source: 'districts', id: hoveredId }, { hover: false });
        }
        hoveredId = e.features[0].id;
        map.setFeatureState({ source: 'districts', id: hoveredId }, { hover: true });
        const props = e.features[0].properties;
        const party = props.party || '';
        const pColor = partyColors[party] || '#444';
        const sw = parseSwing(props.swing);
        const swingHtml = sw.pct > 0 
          ? '<span class="ht-swing">' + (sw.direction === 'to' ? '&#9650;' : '&#9660;') + ' ' + sw.pct.toFixed(1) + '% ' + sw.direction + ' ' + sw.toParty + '</span>'
          : '';
        tooltip.innerHTML = props.name + ' <span class="ht-party" style="background:' + pColor + '">' + (party || 'N/A') + '</span>' + swingHtml;
        tooltip.style.display = 'block';
        map.getCanvas().style.cursor = 'pointer';
      }
    });

    map.on('mouseleave', layer, () => {
      if (hoveredId !== null) {
        map.setFeatureState({ source: 'districts', id: hoveredId }, { hover: false });
      }
      hoveredId = null;
      tooltip.style.display = 'none';
      map.getCanvas().style.cursor = '';
    });

    map.on('click', layer, (e) => {
      if (e.features.length > 0) {
        const props = e.features[0].properties;
        const party = props.party || '';
        const pName = partyNames[party] || 'No votes';
        const pColor = partyColors[party] || '#444';
        const statusLabel = (props.status === 'won' || props.status === 'retain') ? 'RETAIN' : props.status === 'gain' ? 'GAIN' : props.status === 'win' ? 'WIN' : props.status === 'ahead' ? 'AHEAD' : 'NO VOTES';
        
        const sw = parseSwing(props.swing);
        let swingHtml = '';
        if (sw.pct > 0) {
          const cls = sw.direction === 'to' ? 'swing-to' : 'swing-from';
          const arrow = sw.direction === 'to' ? '&#9650;' : '&#9660;';
          swingHtml = '<div class="swing-line"><span class="swing-arrow ' + cls + '">' + arrow + ' ' + sw.pct.toFixed(1) + '%</span> swing ' + sw.direction + ' ' + (partyNames[sw.toParty] || sw.toParty) + '</div>';
        }
        
        let heldHtml = '';
        if (props.held && props.held !== props.party) {
          const heldLabel = (props.status === 'gain' || props.status === 'win') ? 'GAIN FROM ' : 'FROM ';
          heldHtml = '<div class="held-note">' + heldLabel + (partyNames[props.held] || props.held).toUpperCase() + '</div>';
        }
        
        const html = '<div class="popup-content">' +
          '<div class="seat-name">' + props.name + '</div>' +
          '<span class="party-tag" style="background:' + pColor + '">' + pName + '</span> ' +
          '<span class="status">' + statusLabel + '</span>' +
          heldHtml + swingHtml +
          '<div class="counted-pct">' + (props.counted || '0.0%') + ' counted</div>' +
          '</div>';
        new maplibregl.Popup({ maxWidth: '280px' })
          .setLngLat(e.lngLat)
          .setHTML(html)
          .addTo(map);
      }
    });
  });
});

// Set last updated timestamp
(function() {
  const el = document.getElementById('last-updated');
  if (!el) return;
  const now = new Date();
  const opts = { hour: 'numeric', minute: '2-digit', hour12: true, day: 'numeric', month: 'short' };
  el.textContent = 'Updated ' + now.toLocaleString('en-AU', opts);
})();
</script>
</body>
</html>
